<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI使用指南：从入门到进阶 | Ludwig Emergence</title>
    <meta name="description" content="从网页端到AI Agent，手把手教你搭建高阶AI工作流。">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .hero {
            text-align: center;
            max-width: 700px;
            margin-bottom: 3rem;
        }
        .hero h1 {
            font-size: 2.5rem;
            line-height: 1.3;
            margin-bottom: 1rem;
        }
        .hero p {
            color: #a8a8d8;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .steps {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 600px;
            width: 100%;
        }
        .step-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 1.8rem 2rem;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
        }
        .step-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .step-num {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .step-card:nth-child(1) .step-num { background: #95a5a6; }
        .step-card:nth-child(2) .step-num { background: #3498db; }
        .step-card:nth-child(3) .step-num { background: #e67e22; }
        .step-info h3 {
            font-size: 1.15rem;
            margin-bottom: 0.4rem;
        }
        .step-info p {
            color: #a8a8d8;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .arrow {
            margin-left: auto;
            align-self: center;
            color: #666;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .footer-note {
            margin-top: 3rem;
            color: #666;
            font-size: 0.8rem;
            text-align: center;
        }
        @media (max-width: 600px) {
            body { padding: 1.5rem; }
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: 0.95rem; }
            .step-card { padding: 1.2rem; gap: 1rem; }
            .step-num { width: 40px; height: 40px; font-size: 1.1rem; }
            .step-info h3 { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AI 使用指南<br>从入门到进阶</h1>
        <p>大多数人还在用AI聊天，少数人已经在让AI替自己干活。<br>三个步骤，带你走到另一边。</p>
    </div>
    <div class="steps">
        <a href="page1.html" class="step-card">
            <div class="step-num">1</div>
            <div class="step-info">
                <h3>认知升级：AI 使用的四个层级</h3>
                <p>从网页聊天到 AI Agent，搞清楚每一层能做什么、为什么效率差 10 倍。</p>
            </div>
            <div class="arrow">→</div>
        </a>
        <a href="page2.html" class="step-card">
            <div class="step-num">2</div>
            <div class="step-info">
                <h3>动手搭建：获取你的 AI 能力</h3>
                <p>申请 API Key、配置工具、让 AI 真正为你工作。不需要翻墙也能开始。</p>
            </div>
            <div class="arrow">→</div>
        </a>
        <a href="page3.html" class="step-card">
            <div class="step-num">3</div>
            <div class="step-info">
                <h3>实战验证：30 分钟从零到上线</h3>
                <p>一个真实的案例：如何用 5 句话指挥 AI 搭建并发布一个网站。</p>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>
    <div class="footer-note">Ludwig Emergence · 2026</div>
</body>
</html>
